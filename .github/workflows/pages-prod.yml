name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  actions: write
  contents: write
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate docs/catalog.json
        env:
          ORG_NAME: MicrosoftCloudEssentials-LearningHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          AZURE_TRANSLATOR_ENDPOINT: ${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}
          TRANSLATE_TO: ${{ vars.TRANSLATE_TO || 'es,pt,fr' }}
        run: node scripts/fetch-catalog.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Clean up old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = context.workflow;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
            });
            const successfulRuns = runs
              .filter((run) => run.conclusion === 'success' && run.status === 'completed')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const runsToDelete = successfulRuns.slice(2);
            core.info(`Found ${successfulRuns.length} successful runs. Keeping 2, deleting ${runsToDelete.length}.`);
            for (const run of runsToDelete) {
              core.info(`Deleting run ${run.id} created at ${run.created_at}.`);
              await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
            }

      - name: Keep only latest Pages deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              environment: 'github-pages',
              per_page: 100,
            });
            const sorted = deployments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const latest = sorted[0];
            const toDelete = sorted.slice(1);
            core.info(`Found ${sorted.length} deployments. Keeping ${latest ? latest.id : 'none'}, deleting ${toDelete.length}.`);
            for (const d of toDelete) {
              core.info(`Marking deployment ${d.id} inactive.`);
              await github.rest.repos.createDeploymentStatus({
                owner, repo, deployment_id: d.id,
                state: 'inactive', auto_inactive: false,
                description: 'Removed old Pages deployment record',
              });
              core.info(`Deleting deployment ${d.id}.`);
              await github.rest.repos.deleteDeployment({ owner, repo, deployment_id: d.id });
            }
