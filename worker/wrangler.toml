name = "Cloud2BR-MSFTLearningHub-auth"
main = "src/worker.mjs"
compatibility_date = "2025-12-01"

# Configure these via `wrangler secret put ...`:
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - STATE_SECRET
#
# Optional via `wrangler secret put` or `wrangler.toml` vars:
# - ORG_NAME (defaults to Cloud2BR-MSFTLearningHub)
# - ALLOWED_RETURN_ORIGINS (comma-separated, e.g. https://cloud2br-msftlearninghub.github.io,http://localhost:4173)
#
# Optional (translation):
# - TRANSLATOR_KEY
# - TRANSLATOR_REGION
# - TRANSLATOR_ENDPOINT

[vars]
ORG_NAME = "Cloud2BR-MSFTLearningHub"
ALLOWED_RETURN_ORIGINS = "http://localhost:4173,https://cloud2br-msftlearninghub.github.io"
